<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sans:'Montserrat','Helvetica Neue',Helvetica,Arial,sans-serif}
html,body{height:100%;background:#fff}
body{font-family:var(--sans);font-weight:300;color:#111}

/* ── NAV ── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:#fff;
  border-bottom:1px solid #e8e8e8;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;
  height:64px;
}

.nav-logo{
  font-size:13px;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;
  color:#111;text-decoration:none;line-height:1.4;
}
.nav-logo span{
  display:block;font-size:8px;letter-spacing:0.12em;
  color:#999;text-transform:none;margin-top:2px;
}

.nav-right{position:relative;display:flex;align-items:center;gap:24px}

.nav-links{display:flex;gap:24px;list-style:none;align-items:center}
.nav-links a,.nav-links button{
  font-family:var(--sans);font-size:10px;font-weight:300;
  letter-spacing:0.18em;text-transform:uppercase;
  color:#666;text-decoration:none;
  background:none;border:none;cursor:pointer;padding:0;
  transition:color 0.15s;
}
.nav-links a:hover,.nav-links button:hover{color:#111}

/* desktop dropdowns */
.dd-wrap{position:relative}
.dd{
  display:none;
  position:absolute;top:calc(100% + 16px);right:0;
  padding-top:0;
  min-width:210px;z-index:300;
  background:#fff;
  border:1px solid #e8e8e8;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.dd-wrap:hover .dd{display:block}
.dd a{
  display:block;font-size:10px;font-weight:300;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#666;text-decoration:none;
  padding:9px 16px;transition:color 0.12s,background 0.12s;
  border-bottom:1px solid #f5f5f5;
}
.dd a:last-child{border-bottom:none}
.dd a:hover{color:#111;background:#fafafa}

/* Instagram icon */
.nav-ig svg{display:block}

/* hamburger */
.hamburger{
  display:none;background:none;border:none;cursor:pointer;
  padding:4px;flex-direction:column;gap:5px;
}
.hamburger span{width:20px;height:1px;background:#111;display:block}

/* mobile menu */
#mob-menu{
  display:none;
  position:absolute;top:calc(100% + 10px);right:0;
  background:#fff;
  border:1px solid #e8e8e8;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  min-width:210px;max-height:75vh;overflow-y:auto;
  z-index:300;
}
#mob-menu.open{display:block}
.mob-section{
  font-size:8px;letter-spacing:0.22em;text-transform:uppercase;
  color:#bbb;padding:10px 16px 3px;display:block;
}
.mob-btn{
  display:block;width:100%;text-align:left;
  font-family:var(--sans);font-size:10px;font-weight:300;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#666;text-decoration:none;
  padding:8px 16px;
  background:none;border:none;cursor:pointer;
  transition:color 0.12s;
}
.mob-btn:hover{color:#111}

/* ── MAIN CONTENT ── */
#main{
  padding-top:64px;
  min-height:100vh;
  background:#fff;
}

/* ── SLIDESHOW ── */
#slideshow{
  position:relative;
  width:100%;
  height:calc(100vh - 64px);
  background:#f5f5f5;
  overflow:hidden;
}
.slide{
  position:absolute;inset:0;
  opacity:0;transition:opacity 0.6s ease;
  pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.slide.active{opacity:1;pointer-events:auto}
.slide img{
  width:100%;height:100%;
  object-fit:contain;display:block;
  background:#f5f5f5;
}
.slide-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  background:#f5f5f5;
}
.ph-num{font-size:60px;font-weight:200;color:#ddd;line-height:1}
.ph-hint{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:#ccc}

/* slide info */
#slide-info{
  position:absolute;bottom:20px;left:28px;
  pointer-events:none;
}
#info-cat{font-size:8px;font-weight:300;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin-bottom:3px}
#info-name{font-size:11px;font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:#333}

/* arrows */
#arrows{
  position:absolute;top:50%;transform:translateY(-50%);
  left:0;right:0;
  display:flex;justify-content:space-between;padding:0 12px;
  pointer-events:none;
}
.arr{
  background:none;border:none;color:rgba(0,0,0,0.2);
  font-size:32px;cursor:pointer;pointer-events:auto;
  padding:10px;line-height:1;transition:color 0.15s;
}
.arr:hover{color:#111}

/* dots */
#dots{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;
}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(0,0,0,0.15);
  border:none;padding:0;cursor:pointer;
  transition:background 0.2s;
}
.dot.active{background:rgba(0,0,0,0.5)}

/* ── GALLERY PAGE ── */
#gallery-page{
  display:none;position:fixed;
  top:64px;left:0;right:0;bottom:0;
  z-index:100;background:#fff;
  flex-direction:column;overflow:hidden;
}
#gallery-page.open{display:flex}

.gp-bar{
  display:flex;align-items:center;gap:14px;
  padding:12px 28px;
  border-bottom:1px solid #e8e8e8;
  flex-shrink:0;background:#fff;
}
.gp-back{
  font-size:9px;letter-spacing:0.16em;text-transform:uppercase;
  color:#999;background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-weight:300;padding:0;transition:color 0.15s;
}
.gp-back:hover{color:#111}
.gp-sep{color:#ddd;font-size:10px}
.gp-title{font-size:10px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;color:#111}
.gp-cat{font-size:8px;font-weight:200;letter-spacing:0.16em;text-transform:uppercase;color:#bbb;margin-left:auto}

/* gallery slideshow */
.gp-slideshow{
  flex:1;position:relative;
  background:#fff;overflow:hidden;min-height:0;
}
.gp-slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity 0.4s;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.gp-slide.active{opacity:1;pointer-events:auto}
.gp-slide img{
  max-width:100%;max-height:100%;
  object-fit:contain;display:block;
  background:#fff;
}

.gp-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-top:1px solid #e8e8e8;
  flex-shrink:0;background:#fff;
}
.gp-arr{
  background:none;border:none;color:#bbb;
  font-size:24px;cursor:pointer;padding:6px;line-height:1;transition:color 0.15s;
}
.gp-arr:hover{color:#111}
.gp-counter{font-size:10px;letter-spacing:0.1em;color:#999;font-family:var(--sans)}
.gp-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.gp-dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(0,0,0,0.12);border:none;padding:0;cursor:pointer;transition:background 0.15s;
}
.gp-dot.active{background:rgba(0,0,0,0.5)}

/* ── INNER PAGES ── */
#inner-page{
  display:none;position:fixed;
  top:64px;left:0;right:0;bottom:0;
  z-index:100;background:#fff;overflow-y:auto;
}
#inner-page.open{display:block}
.ip-bar{
  padding:14px 28px;border-bottom:1px solid #e8e8e8;
  display:flex;align-items:center;gap:14px;background:#fff;
}
.ip-back{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:#999;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:300;padding:0;transition:color 0.15s}
.ip-back:hover{color:#111}
.ip-title{font-size:10px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;color:#111}
.ip-body{max-width:560px;margin:0 auto;padding:48px 28px 80px}
.ip-body p{font-size:14px;line-height:2;color:#555;margin-bottom:20px;font-weight:300}
.ip-body a{color:#111;text-decoration:none;border-bottom:1px solid #ddd;transition:border-color 0.15s}
.ip-body a:hover{border-color:#111}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .nav-links{display:none}
  .hamburger{display:flex}
  #nav{padding:14px 18px}
  #slide-info{left:18px;bottom:52px}
  .gp-bar,.ip-bar{padding:10px 16px}
  .ip-body{padding:32px 16px 60px}
}
@media(max-width:400px){
  .gp-dots{display:none}
}
</style>
</head>

</div>

<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Person","name":"Leandro Lozada y Leon","jobTitle":"Photojournalist","address":{"@type":"PostalAddress","addressLocality":"Louisville","addressRegion":"KY"},"email":"kacumen@gmail.com","telephone":"502-407-4764","url":"https://lozadaphotography.com","sameAs":["https://instagram.com/lozada1816"]}

<script>
var G = {
  editorial:[
    {name:'Louisville Protests',slug:'louisvilleprotests',photos:10},
    {name:'CPAC 26',slug:'cpac-26',photos:5},
    {name:'NRA Atlanta 2025',slug:'nra-atlanta-2025',photos:8},
    {name:'KY Derby 151',slug:'ky-derby-151',photos:8},
    {name:'KY Derby 152',slug:'ky-derby-152',photos:8},
    {name:'Whiskey House for WIRED',slug:'bourbon',photos:8},
    {name:'The Athletic',slug:'the-athletic',photos:8},
    {name:'Derby Portraits',slug:'derby-portraits',photos:8},
    {name:'Professional Bull Riding',slug:'pbr',photos:8},
    {name:'Sturgis KY Motorcycle Rally',slug:'sturgis-ky-motorcycle-rally',photos:8},
    {name:'Eastern KY Floods',slug:'eastern-ky-floods',photos:8},
    {name:'Western KY Tornadoes',slug:'mayfield-dawson',photos:8},
    {name:'Charlie Kirk Vigil',slug:'new-gallery-4',photos:8},
    {name:'Livestock Expo',slug:'livestock-expo',photos:8},
    {name:'Portraits',slug:'rust',photos:8},
    {name:'Covid-19 Portraits',slug:'covid19-portraits',photos:8},
    {name:'NFAC Coalition',slug:'nafc-coalition',photos:8},
    {name:'Ukrainian Refugees',slug:'new-gallery-1',photos:8},
    {name:'Militias',slug:'militias',photos:8},
    {name:'KY Derby 150',slug:'kyderby',photos:8},
    {name:'DC',slug:'gallerydc',photos:8}
  ],
  personal:[
    {name:'My Family on Film',slug:'new-gallery-12',photos:8},
    {name:'Re-enchantment',slug:'miscelaneous',photos:8},
    {name:'Street',slug:'water',photos:8},
    {name:'Milk Portraits',slug:'milk-portraits',photos:8}
  ],
  commercial:[
    {name:'Wild Hats',slug:'wild-hats',photos:8},
    {name:'Hotel Genevieve',slug:'hotel-genevieve',photos:8},
    {name:'Windy Hill Wagyu Farm',slug:'windy-hill-waygu-farm',photos:8},
    {name:'Fox Hollow Farm',slug:'fox-hollow-farm',photos:8},
    {name:'Harbor Network Conference',slug:'harbor-network-conference',photos:8}
  ]
};
var CATS = {editorial:'Editorial',personal:'Personal',commercial:'Commercial'};
var BASE = '/kacumen-13.github.io/';

// flat list
var allSlides = [];
['editorial','personal','commercial'].forEach(function(cat){
  G[cat].forEach(function(g,i){ allSlides.push({name:g.name,slug:g.slug,photos:g.photos,cat:cat,idx:i}); });
});

var curSlide = 0;
var gpCurrent = 0;
var gpTotal = 0;

// BUILD SLIDESHOW
function buildSlideshow(){
  var ss = document.getElementById('slideshow');
  var ds = document.getElementById('dots');
  allSlides.forEach(function(p,i){
    var s = document.createElement('div');
    s.className = 'slide'+(i===0?' active':'');
    s.dataset.cat = p.cat;
    s.dataset.idx = String(p.idx);
    s.addEventListener('click',function(){
      openGallery(this.dataset.cat, parseInt(this.dataset.idx));
    });
    var img = document.createElement('img');
    img.alt = p.name;
    img.src = BASE+'photos/'+p.cat+'/'+p.slug+'/cover.jpg';
    img.addEventListener('error',function(){
      this.style.display='none';
      var ph=document.createElement('div');ph.className='slide-placeholder';
      ph.innerHTML='<div class="ph-num">'+String(i+1).padStart(2,'0')+'</div><div class="ph-hint">'+p.name+'</div>';
      s.appendChild(ph);
    });
    s.appendChild(img);
    ss.insertBefore(s, document.getElementById('slide-info'));
    var d=document.createElement('button');
    d.className='dot'+(i===0?' active':'');
    (function(n){d.addEventListener('click',function(e){e.stopPropagation();goToSlide(n);});})(i);
    ds.appendChild(d);
  });
  updateInfo();
}

function goToSlide(n){
  document.querySelectorAll('.slide')[curSlide].classList.remove('active');
  document.querySelectorAll('.dot')[curSlide].classList.remove('active');
  curSlide=n;
  document.querySelectorAll('.slide')[curSlide].classList.add('active');
  document.querySelectorAll('.dot')[curSlide].classList.add('active');
  updateInfo();
}
function nextSlide(){goToSlide((curSlide+1)%allSlides.length);}
function prevSlide(){goToSlide((curSlide-1+allSlides.length)%allSlides.length);}
function updateInfo(){
  document.getElementById('info-cat').textContent=CATS[allSlides[curSlide].cat];
  document.getElementById('info-name').textContent=allSlides[curSlide].name;
}

// BUILD NAV
function buildNavs(){
  ['editorial','personal','commercial'].forEach(function(cat){
    var dd=document.getElementById('dd-'+cat);
    var mob=document.getElementById('mob-'+cat);
    G[cat].forEach(function(g,i){
      var a=document.createElement('a');a.href='#';a.textContent=g.name;
      (function(c,n){a.addEventListener('click',function(e){e.preventDefault();openGallery(c,n);});})(cat,i);
      dd.appendChild(a);
      var b=document.createElement('button');b.className='mob-btn';b.textContent=g.name;
      (function(c,n){b.addEventListener('click',function(){openGallery(c,n);toggleMob();});})(cat,i);
      mob.appendChild(b);
    });
  });
}

// GALLERY
function openGallery(cat,idx){
  var g=G[cat][idx];
  document.getElementById('gp-title').textContent=g.name;
  document.getElementById('gp-cat').textContent=CATS[cat];
  var ss=document.getElementById('gp-slideshow');
  var dots=document.getElementById('gp-dots');
  ss.innerHTML='';dots.innerHTML='';
  gpCurrent=0;gpTotal=g.photos;
  for(var i=0;i<g.photos;i++){
    var src=BASE+'photos/'+cat+'/'+g.slug+'/photo-'+String(i+1).padStart(2,'0')+'.jpg';
    var slide=document.createElement('div');
    slide.className='gp-slide'+(i===0?' active':'');
    var img=document.createElement('img');
    img.alt=g.name+' '+(i+1);img.src=src;
    slide.appendChild(img);ss.appendChild(slide);
    var dot=document.createElement('button');
    dot.className='gp-dot'+(i===0?' active':'');
    (function(n){dot.addEventListener('click',function(){gpGo(n);});})(i);
    dots.appendChild(dot);
  }
  document.getElementById('gp-counter').textContent='1 / '+gpTotal;
  document.getElementById('gallery-page').classList.add('open');
}
function closeGallery(){document.getElementById('gallery-page').classList.remove('open');}
function gpGo(n){
  document.querySelectorAll('.gp-slide')[gpCurrent].classList.remove('active');
  document.querySelectorAll('.gp-dot')[gpCurrent].classList.remove('active');
  gpCurrent=n;
  document.querySelectorAll('.gp-slide')[gpCurrent].classList.add('active');
  document.querySelectorAll('.gp-dot')[gpCurrent].classList.add('active');
  document.getElementById('gp-counter').textContent=(gpCurrent+1)+' / '+gpTotal;
}
function gpNext(){gpGo((gpCurrent+1)%gpTotal);}
function gpPrev(){gpGo((gpCurrent-1+gpTotal)%gpTotal);}

// INNER PAGES
var PAGES={
  about:{title:'About',html:'<p>Leandro Lozada is a photojournalist based in Louisville, KY. He uses his camera and drone to document relevant stories.</p><p>His clients include the <strong style="font-weight:400">Washington Post</strong>, <strong style="font-weight:400">AFP</strong>, <strong style="font-weight:400">Politico Magazine</strong>, and <strong style="font-weight:400">Al Día News</strong>. His work has appeared in The Guardian, NPR, La Jornada, El País, The New York Times, CNN, and other publications.</p><p>He is available for assignments around the country and internationally.</p><p>Besides photography, Leandro loves his family, coffee, motorcycles, movies, music, books, and soccer.</p><p style="margin-top:32px"><a href="mailto:kacumen@gmail.com">kacumen@gmail.com</a><br><span style="font-size:13px;color:#aaa">502 407 4764</span></p><p style="margin-top:16px"><a href="https://instagram.com/lozada1816" target="_blank" rel="noopener">@lozada1816 on Instagram</a></p>'},
  contact:{title:'Contact',html:'<p>Available for editorial, commercial, and documentary assignments worldwide.</p><p><a href="mailto:kacumen@gmail.com" style="font-size:15px">kacumen@gmail.com</a></p><p style="margin-top:8px"><span style="font-size:13px;color:#aaa">502 407 4764</span></p><p style="margin-top:28px"><a href="https://instagram.com/lozada1816" target="_blank" rel="noopener">Instagram — @lozada1816</a></p>'}
};
function showPage(p){
  document.getElementById('ip-title').textContent=PAGES[p].title;
  document.getElementById('ip-body').innerHTML=PAGES[p].html;
  document.getElementById('inner-page').classList.add('open');
  document.getElementById('inner-page').scrollTop=0;
}
function closePage(){document.getElementById('inner-page').classList.remove('open');}
function showHome(){closeGallery();closePage();}

// MOBILE
function toggleMob(){document.getElementById('mob-menu').classList.toggle('open');}
document.addEventListener('click',function(e){
  var m=document.getElementById('mob-menu');
  var nr=document.querySelector('.nav-right');
  if(m.classList.contains('open')&&!nr.contains(e.target)){m.classList.remove('open');}
});

// KEYBOARD
document.addEventListener('keydown',function(e){
  if(document.getElementById('gallery-page').classList.contains('open')){
    if(e.key==='ArrowRight')gpNext();
    if(e.key==='ArrowLeft')gpPrev();
    if(e.key==='Escape')closeGallery();
  } else if(!document.getElementById('inner-page').classList.contains('open')){
    if(e.key==='ArrowRight')nextSlide();
    if(e.key==='ArrowLeft')prevSlide();
  }
});

buildNavs();
buildSlideshow();
</script>
</body>
</html>
