<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sans:'Montserrat','Helvetica Neue',Helvetica,Arial,sans-serif;
}
html,body{height:100%;overflow:hidden;background:#111}
body{font-family:var(--sans);font-weight:300}

/* SLIDESHOW */
#slideshow{position:fixed;inset:0;z-index:0}
.slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity 0.8s ease;background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:contain;display:block;background:#111}
.slide::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.05) 50%,rgba(0,0,0,0.2) 100%);
  pointer-events:none;
}
.slide-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
.ph-num{font-size:80px;font-weight:200;color:rgba(255,255,255,0.05);letter-spacing:-0.04em;line-height:1}
.ph-hint{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.12)}

/* NAV */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 28px;
}
.nav-logo{
  font-size:11.5px;font-weight:200;letter-spacing:0.3em;text-transform:uppercase;
  color:#fff;text-decoration:none;
  text-shadow:0 1px 6px rgba(0,0,0,0.5);
  line-height:1.4;
}
.nav-sub{
  display:block;font-size:8.5px;font-weight:200;letter-spacing:0.15em;
  color:rgba(255,255,255,0.45);text-transform:none;margin-top:3px;
}

/* desktop nav links */
.nav-links{display:flex;gap:20px;list-style:none;align-items:center;position:relative}
.nav-links li{position:relative}
.nav-links a,.nav-links button{
  font-family:var(--sans);font-size:9.5px;font-weight:300;
  letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(255,255,255,0.8);text-decoration:none;
  background:none;border:none;cursor:pointer;padding:0;
  transition:color 0.15s;text-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.nav-links a:hover,.nav-links button:hover{color:#fff}

/* desktop dropdown */
.dd{
  display:none;position:absolute;top:100%;right:0;
  padding-top:14px;
  min-width:200px;z-index:200;
}
.nav-links li:hover .dd{display:block}
.dd-inner{
  background:rgba(10,10,10,0.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
}
.dd a{
  display:block;font-size:9.5px;font-weight:300;
  letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);text-decoration:none;
  padding:8px 16px;transition:color 0.12s;
  border:none;background:none;
}
.dd a:hover{color:#fff;background:rgba(255,255,255,0.04)}

/* hamburger */
.hamburger{
  display:none;background:none;border:none;cursor:pointer;
  padding:4px;flex-direction:column;gap:5px;position:relative;
}
.hamburger span{width:20px;height:1px;background:#fff;display:block}

/* MOBILE DROPDOWN — anchored to hamburger */
#mob-menu{
  display:none;position:absolute;top:calc(100% + 10px);right:0;
  background:rgba(10,10,10,0.96);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.07);
  min-width:200px;max-height:80vh;overflow-y:auto;
  z-index:200;
}
#mob-menu.open{display:block}
.mob-section{
  font-size:8px;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(255,255,255,0.2);padding:10px 16px 4px;display:block;
}
.mob-item{
  display:block;font-size:9.5px;font-weight:300;
  letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.6);text-decoration:none;
  padding:7px 16px;transition:color 0.12s;
  background:none;border:none;font-family:var(--sans);
  cursor:pointer;text-align:left;width:100%;
}
.mob-item:hover{color:#fff}

/* hamburger wrapper needs relative positioning */
.hamburger-wrap{position:relative;display:none}

/* SLIDE INFO */
#slide-info{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:20px 28px 24px;pointer-events:none;
}
.info-cat{font-size:8.5px;font-weight:300;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.4);text-shadow:0 1px 4px rgba(0,0,0,0.4);margin-bottom:4px}
.info-name{font-size:10px;font-weight:300;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.75);text-shadow:0 1px 4px rgba(0,0,0,0.4)}

/* ARROWS */
#arrows{
  position:fixed;top:50%;transform:translateY(-50%);
  left:0;right:0;z-index:100;
  display:flex;justify-content:space-between;
  padding:0 16px;pointer-events:none;
}
.arr{
  background:none;border:none;color:rgba(255,255,255,0.4);
  font-size:30px;cursor:pointer;pointer-events:auto;
  padding:12px;line-height:1;transition:color 0.15s;
  text-shadow:0 1px 6px rgba(0,0,0,0.4);
}
.arr:hover{color:#fff}

/* DOTS */
#dots{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;gap:6px;
}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,0.25);cursor:pointer;
  border:none;padding:0;transition:background 0.2s;
}
.dot.active{background:rgba(255,255,255,0.85)}

/* GALLERY PAGE */
#gallery-page{
  display:none;position:fixed;inset:0;z-index:50;
  background:#fff;overflow-y:auto;
}
#gallery-page.open{display:block}
.gp-bar{
  position:sticky;top:0;z-index:10;
  background:rgba(255,255,255,0.96);backdrop-filter:blur(10px);
  border-bottom:1px solid #e8e8e8;
  padding:14px 28px;display:flex;align-items:center;gap:14px;
}
.gp-back{
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  color:#999;background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-weight:300;padding:0;transition:color 0.15s;
}
.gp-back:hover{color:#111}
.gp-sep{color:#ddd}
.gp-title{font-size:10px;font-weight:300;letter-spacing:0.16em;text-transform:uppercase;color:#111}
.gp-cat{font-size:9px;font-weight:200;letter-spacing:0.18em;text-transform:uppercase;color:#bbb;margin-left:auto}
.gp-grid{columns:3;column-gap:3px;padding:3px}
.gp-item{break-inside:avoid;margin-bottom:3px;overflow:hidden;cursor:pointer;background:#f0f0ee}
.gp-item img{width:100%;display:block;transition:transform 0.4s,filter 0.3s;filter:saturate(0.9)}
.gp-item:hover img{transform:scale(1.02);filter:saturate(1)}
.gp-ph{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#f0efed}
.gp-ph-n{font-size:36px;font-weight:200;color:#ddd;font-family:var(--sans)}

/* LIGHTBOX */
#lightbox{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.96);align-items:center;justify-content:center;
}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;display:block}
#lb-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;opacity:0.5;line-height:1;font-family:var(--sans)}
#lb-close:hover{opacity:1}
#lb-prev,#lb-next{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:32px;cursor:pointer;opacity:0.3;padding:16px;line-height:1}
#lb-prev:hover,#lb-next:hover{opacity:1}
#lb-prev{left:8px}
#lb-next{right:8px}
#lb-count{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.3);font-family:var(--sans)}

/* INNER PAGE */
#inner-page{
  display:none;position:fixed;inset:0;z-index:50;
  background:#fff;overflow-y:auto;
}
#inner-page.open{display:block}
.ip-bar{
  position:sticky;top:0;background:rgba(255,255,255,0.96);
  backdrop-filter:blur(10px);border-bottom:1px solid #e8e8e8;
  padding:14px 28px;display:flex;align-items:center;gap:14px;
}
.ip-back{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#999;background:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:300;padding:0;transition:color 0.15s}
.ip-back:hover{color:#111}
.ip-title{font-size:10px;font-weight:300;letter-spacing:0.16em;text-transform:uppercase;color:#111}
.ip-body{max-width:560px;margin:0 auto;padding:52px 28px 80px}
.ip-body p{font-size:14px;line-height:2;color:#555;margin-bottom:20px;font-weight:300}
.ip-body a{color:#111;text-decoration:none;border-bottom:1px solid #ddd;transition:border-color 0.15s}
.ip-body a:hover{border-color:#111}

/* RESPONSIVE */
@media(max-width:700px){
  .nav-links{display:none}
  .hamburger-wrap{display:block}
  #nav{padding:18px 18px}
  #slide-info{padding:16px 18px 56px}
  .gp-grid{columns:2}
  .gp-bar{padding:12px 16px}
  .ip-body{padding:36px 18px 60px}
}
@media(max-width:400px){.gp-grid{columns:1}}
</style>
</head>

{"@context":"https://schema.org","@type":"Person","name":"Leandro Lozada y Leon","jobTitle":"Photojournalist","address":{"@type":"PostalAddress","addressLocality":"Louisville","addressRegion":"KY"},"email":"kacumen@gmail.com","telephone":"502-407-4764","url":"https://lozadaphotography.com","sameAs":["https://instagram.com/lozada1816"]}

<script>
const G={
  editorial:[
    {name:'Louisville Protests',slug:'louisvilleprotests',photos:10},
    {name:'CPAC 26',slug:'cpac-26',photos:8},
    {name:'NRA Atlanta 2025',slug:'nra-atlanta-2025',photos:8},
    {name:'KY Derby 151',slug:'ky-derby-151',photos:8},
    {name:'KY Derby 152',slug:'ky-derby-152',photos:8},
    {name:'Whiskey House for WIRED',slug:'bourbon',photos:8},
    {name:'The Athletic',slug:'the-athletic',photos:8},
    {name:'Derby Portraits',slug:'derby-portraits',photos:8},
    {name:'Professional Bull Riding',slug:'pbr',photos:8},
    {name:'Sturgis KY Motorcycle Rally',slug:'sturgis-ky-motorcycle-rally',photos:8},
    {name:'Eastern KY Floods',slug:'eastern-ky-floods',photos:8},
    {name:'Western KY Tornadoes',slug:'mayfield-dawson',photos:8},
    {name:'Charlie Kirk Vigil',slug:'new-gallery-4',photos:8},
    {name:'Livestock Expo',slug:'livestock-expo',photos:8},
    {name:'Portraits',slug:'rust',photos:8},
    {name:'Covid-19 Portraits',slug:'covid19-portraits',photos:8},
    {name:'NFAC Coalition',slug:'nafc-coalition',photos:8},
    {name:'Ukrainian Refugees',slug:'new-gallery-1',photos:8},
    {name:'Militias',slug:'militias',photos:8},
    {name:'KY Derby 150',slug:'kyderby',photos:8},
    {name:'DC',slug:'gallerydc',photos:8}
  ],
  personal:[
    {name:'My Family on Film',slug:'new-gallery-12',photos:8},
    {name:'Re-enchantment',slug:'miscelaneous',photos:8},
    {name:'Street',slug:'water',photos:8},
    {name:'Milk Portraits',slug:'milk-portraits',photos:8}
  ],
  commercial:[
    {name:'Wild Hats',slug:'wild-hats',photos:8},
    {name:'Hotel Genevieve',slug:'hotel-genevieve',photos:8},
    {name:'Windy Hill Wagyu Farm',slug:'windy-hill-waygu-farm',photos:8},
    {name:'Fox Hollow Farm',slug:'fox-hollow-farm',photos:8},
    {name:'Harbor Network Conference',slug:'harbor-network-conference',photos:8}
  ]
};
const CATS={editorial:'Editorial',personal:'Personal',commercial:'Commercial'};

// Flat list for slideshow
let all=[];
['editorial','personal','commercial'].forEach(cat=>G[cat].forEach((g,i)=>all.push({...g,cat,idx:i})));

let cur=0,lbPhotos=[],lbIdx=0,timer;

// SLIDESHOW
function buildSlideshow(){
  const ss=document.getElementById('slideshow');
  const ds=document.getElementById('dots');
  all.forEach((p,i)=>{
    const s=document.createElement('div');
    s.className='slide'+(i===0?' active':'');
    s.onclick=(e)=>{e.stopPropagation();openGallery(p.cat,p.idx)};
    const img=document.createElement('img');
    img.alt=p.name;img.src=`photos/${p.cat}/${p.slug}/cover.jpg`;
    img.onerror=function(){
      this.style.display='none';
      const ph=document.createElement('div');ph.className='slide-placeholder';
      ph.innerHTML=`<div class="ph-num">${String(i+1).padStart(2,'0')}</div><div class="ph-hint">${p.name}</div>`;
      s.appendChild(ph);
    };
    s.appendChild(img);ss.appendChild(s);
    const d=document.createElement('button');
    d.className='dot'+(i===0?' active':'');
    d.onclick=e=>{e.stopPropagation();go(i)};
    ds.appendChild(d);
  });
  updateInfo();
  timer=setInterval(()=>go((cur+1)%all.length),5000);
}
function go(i){
  document.querySelectorAll('.slide')[cur].classList.remove('active');
  document.querySelectorAll('.dot')[cur].classList.remove('active');
  cur=i;
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.querySelectorAll('.dot')[cur].classList.add('active');
  updateInfo();
}
function nextSlide(){clearInterval(timer);go((cur+1)%all.length)}
function prevSlide(){clearInterval(timer);go((cur-1+all.length)%all.length)}
function updateInfo(){
  document.getElementById('info-cat').textContent=CATS[all[cur].cat];
  document.getElementById('info-name').textContent=all[cur].name;
}

// NAV DROPDOWNS
function buildNavs(){
  ['editorial','personal','commercial'].forEach(cat=>{
    const ddEl=document.getElementById('dd-'+cat);
    const dd=ddEl.querySelector('.dd-inner')||ddEl;
    const mob=document.getElementById('mob-'+cat);
    G[cat].forEach((g,i)=>{
      const a=document.createElement('a');a.href='#';a.textContent=g.name;
      a.onclick=e=>{e.preventDefault();openGallery(cat,i)};dd.appendChild(a);
      const b=document.createElement('button');b.className='mob-item';b.textContent=g.name;
      b.onclick=()=>{openGallery(cat,i);toggleMob()};mob.appendChild(b);
    });
  });
}

// GALLERY
function openGallery(cat,idx){
  const g=G[cat][idx];
  document.getElementById('gp-title').textContent=g.name;
  document.getElementById('gp-cat').textContent=CATS[cat];
  const grid=document.getElementById('gp-grid');grid.innerHTML='';lbPhotos=[];
  for(let i=0;i<g.photos;i++){
    const src=`photos/${cat}/${g.slug}/photo-${String(i+1).padStart(2,'0')}.jpg`;
    lbPhotos.push({src});
    const item=document.createElement('div');item.className='gp-item';
    const ic=i;item.onclick=()=>openLb(ic);
    const img=document.createElement('img');img.alt=g.name+' '+(i+1);img.src=src;img.loading='lazy';
    img.onerror=function(){
      this.style.display='none';
      const ph=document.createElement('div');ph.className='gp-ph';
      ph.innerHTML=`<span class="gp-ph-n">${String(i+1).padStart(2,'0')}</span>`;
      item.appendChild(ph);
    };
    item.appendChild(img);grid.appendChild(item);
  }
  document.getElementById('gallery-page').classList.add('open');
  document.getElementById('gallery-page').scrollTop=0;
}
function closeGallery(){document.getElementById('gallery-page').classList.remove('open')}

// LIGHTBOX
function openLb(i){lbIdx=i;updateLb();document.getElementById('lightbox').classList.add('open')}
function closeLb(){document.getElementById('lightbox').classList.remove('open')}
function updateLb(){
  document.getElementById('lb-img').src=lbPhotos[lbIdx].src;
  document.getElementById('lb-count').textContent=(lbIdx+1)+' / '+lbPhotos.length;
}
function lbNav(d){lbIdx=(lbIdx+d+lbPhotos.length)%lbPhotos.length;updateLb()}

// INNER PAGES
const PAGES={
  about:{title:'About',html:`<p>Leandro Lozada is a photojournalist based in Louisville, KY. He uses his camera and drone to document relevant stories.</p><p>His clients include the <strong style="font-weight:400">Washington Post</strong>, <strong style="font-weight:400">AFP</strong>, <strong style="font-weight:400">Politico Magazine</strong>, and <strong style="font-weight:400">Al Día News</strong>. His work has appeared in The Guardian, NPR, La Jornada, El País, The New York Times, CNN, and other publications.</p><p>He is available for assignments around the country and internationally.</p><p>Besides photography, Leandro loves his family, coffee, motorcycles, movies, music, books, and soccer.</p><p style="margin-top:36px"><a href="mailto:kacumen@gmail.com">kacumen@gmail.com</a><br><span style="font-size:13px;color:#aaa">502 407 4764</span></p><p style="margin-top:16px"><a href="https://instagram.com/lozada1816" target="_blank" rel="noopener">@lozada1816 on Instagram</a></p>`},

function openPage(p){
  document.getElementById('ip-title').textContent=PAGES[p].title;
  document.getElementById('ip-body').innerHTML=PAGES[p].html;
  document.getElementById('inner-page').classList.add('open');
  document.getElementById('inner-page').scrollTop=0;
}
function closePage(){document.getElementById('inner-page').classList.remove('open')}
function closeAll(){closeGallery();closePage()}

// MOBILE MENU
function toggleMob(){document.getElementById('mob-menu').classList.toggle('open')}
document.addEventListener('click',e=>{
  const m=document.getElementById('mob-menu');
  const hw=document.querySelector('.hamburger-wrap');
  if(m.classList.contains('open')&&!hw.contains(e.target))m.classList.remove('open');
});

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('open')){
    if(e.key==='ArrowRight')lbNav(1);
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='Escape')closeLb();
  } else if(!document.getElementById('gallery-page').classList.contains('open')&&
            !document.getElementById('inner-page').classList.contains('open')){
    if(e.key==='ArrowRight')nextSlide();
    if(e.key==='ArrowLeft')prevSlide();
  }
});

buildNavs();
buildSlideshow();
